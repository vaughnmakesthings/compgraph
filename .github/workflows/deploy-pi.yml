name: Deploy to Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH
        run: |
          tailscale status

          # Resolve IP via Tailscale CLI — MagicDNS is unreliable on ephemeral runners
          PI_IP=$(tailscale ip -4 devserver)
          echo "Resolved devserver → $PI_IP"

          ssh -o StrictHostKeyChecking=no root@${PI_IP} bash <<'DEPLOY'
          set -euo pipefail

          APP_DIR="/opt/compgraph-eval"
          FRONTEND_SERVICE="compgraph-eval"
          API_SERVICE="compgraph-eval-api"

          echo "==> Pulling latest code..."
          cd "$APP_DIR" && git pull origin main

          echo "==> Installing Python dependencies..."
          cd "$APP_DIR" && uv sync

          echo "==> Installing Node dependencies..."
          cd "$APP_DIR/web" && npm ci

          echo "==> Building frontend..."
          npm run build

          echo "==> Linking static assets..."
          ln -sf "$APP_DIR/web/public" "$APP_DIR/web/.next/standalone/public"
          mkdir -p "$APP_DIR/web/.next/standalone/.next"
          ln -sf "$APP_DIR/web/.next/static" "$APP_DIR/web/.next/standalone/.next/static"

          echo "==> Fixing ownership..."
          chown -R "$FRONTEND_SERVICE:$FRONTEND_SERVICE" "$APP_DIR"

          echo "==> Restarting services..."
          systemctl restart "$API_SERVICE"
          systemctl restart "$FRONTEND_SERVICE"

          echo "==> Health checks..."
          sleep 3
          API_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/api/config/models)
          WEB_STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000)
          if [ "$API_STATUS" = "200" ] && [ "$WEB_STATUS" = "200" ]; then
              echo "==> Deploy successful!"
          else
              echo "==> FAILED: API=$API_STATUS, Web=$WEB_STATUS"
              journalctl -u "$API_SERVICE" --no-pager -n 10
              journalctl -u "$FRONTEND_SERVICE" --no-pager -n 10
              exit 1
          fi
          DEPLOY

      - name: Report failure
        if: failure()
        run: echo "::error::Deployment to Pi failed. Check the deploy step logs above."
